version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
      timezone: Europe/Zurich
      time: "01:30"
    labels:
      - dependencies/github-actions

  # .NET SDK (major, minor)
  - package-ecosystem: dotnet-sdk
    directory: /
    schedule:
      interval: weekly
      day: sunday
      timezone: Europe/Zurich
      time: "02:00"
    labels:
      - dependencies/dotnet-sdk
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
    groups:
      dotnet-sdk-next:
        update-types:
          - major
          - minor

  # .NET SDK (patch)
  - package-ecosystem: dotnet-sdk
    directory: /
    schedule:
      interval: weekly
      day: sunday
      timezone: Europe/Zurich
      time: "02:30"
    labels:
      - dependencies/dotnet-sdk
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      dotnet-sdk-updates:
        update-types:
          - patch

  # NuGet (major)
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      timezone: Europe/Zurich
      time: "03:30"
    labels:
      - dependencies/nuget
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    groups:
      # Versioning
      versioning-next:
        update-types:
          - major
        patterns:
          - "Asp.Versioning.*"

      # Aspire
      aspire-next:
        update-types:
          - major
        patterns:
          - "Aspire"
          - "Aspire.*"

      # .NET with Packages that start with Microsoft namespace
      dotnet-microsoft-next:
        update-types:
          - major
        patterns:
          - "Microsoft.*"

      # .NET with Packages that start with System namespace
      dotnet-system-next:
        update-types:
          - major
        patterns:
          - "System"
          - "System.*"

      # Microsoft Orleans
      orleans-next:
        update-types:
          - major
        patterns:
          - "Microsoft.Orleans.*"

      # Open Telemetry
      observability-next:
        update-types:
          - major
        patterns:
          - "OpenTelemetry.*"

      # FluentMigrator
      fluent-migrator-next:
        update-types:
          - major
        patterns:
          - "FluentMigrator"
          - "FluentMigrator.*"

      # Npgsql
      npgsql-next:
        update-types:
          - major
        patterns:
          - "Npgsql"
          - "Npgsql.*"

      # Spectre
      spectre-next:
        update-types:
          - major
        patterns:
          - "Spectre.Console.Cli"
          - "Spectre.Console.Cli.*"

      # Swashbuckle
      swashbuckle-next:
        update-types:
          - major
        patterns:
          - "Swashbuckle.AspNetCore"
          - "Swashbuckle.AspNetCore.*"

      # Temporal
      temporal-next:
        update-types:
          - major
        patterns:
          - "Temporalio"
          - "Temporalio.*"

      # xunit
      xunit-next:
        update-types:
          - major
        patterns:
          - "xunit.*"

  # NuGet (minor, patch)
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: daily
      timezone: Europe/Zurich
      time: "03:00"
    labels:
      - dependencies/nuget
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      # Versioning
      versioning-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Asp.Versioning.*"

      # Aspire
      aspire-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Aspire"
          - "Aspire.*"

      # .NET with Packages that start with Microsoft namespace
      dotnet-microsoft-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Microsoft.*"

      # .NET with Packages that start with System namespace
      dotnet-system-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "System"
          - "System.*"

      # Microsoft Orleans
      orleans-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Microsoft.Orleans.*"

      # Open Telemetry
      observability-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "OpenTelemetry.*"

      # FluentMigrator
      fluent-migrator-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "FluentMigrator"
          - "FluentMigrator.*"

      # Npgsql
      npgsql-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Npgsql"
          - "Npgsql.*"

      # Spectre
      spectre-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Spectre.Console.Cli"
          - "Spectre.Console.Cli.*"

      # Swashbuckle
      swashbuckle-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Swashbuckle.AspNetCore"
          - "Swashbuckle.AspNetCore.*"

      # Temporal
      temporal-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "Temporalio"
          - "Temporalio.*"

      # xunit
      xunit-updates:
        update-types:
          - minor
          - patch
        patterns:
          - "xunit.*"
